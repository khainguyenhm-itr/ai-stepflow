name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build VSIX
        run: npm run package:vsix

      - name: Publish to VS Code Marketplace
        # vsce reads the token from the VSCE_PAT env var. Set it in repo Settings → Secrets.
        run: npx @vscode/vsce publish --packagePath ai-stepflow.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Attach the VSIX to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ai-stepflow.vsix
