<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="1000" height="250" rx="10" fill="#1e1e1e"/>

  <!-- Building blocks group -->
  <rect x="24" y="44" width="214" height="170" rx="8" fill="#202020" stroke="#383838"/>
  <text x="131" y="34" fill="#8a8a8a" font-size="12" text-anchor="middle">Building blocks</text>

  <rect x="40" y="62" width="182" height="64" rx="6" fill="#2a2a2a" stroke="#3c3c3c"/>
  <text x="54" y="86" fill="#ffffff" font-size="14" font-weight="700">Agent</text>
  <text x="54" y="106" fill="#aaaaaa" font-size="11.5">who does the work</text>
  <text x="54" y="120" fill="#777777" font-size="10.5">(a system prompt)</text>

  <rect x="40" y="134" width="182" height="64" rx="6" fill="#2a2a2a" stroke="#3c3c3c"/>
  <text x="54" y="158" fill="#ffffff" font-size="14" font-weight="700">Skills</text>
  <text x="54" y="178" fill="#aaaaaa" font-size="11.5">techniques to apply</text>
  <text x="54" y="192" fill="#777777" font-size="10.5">(write tests, review…)</text>

  <!-- arrow 1 -->
  <g stroke="#5a5a5a" stroke-width="2" fill="none"><path d="M246 129 h34"/><path d="M274 123 l8 6 -8 6"/></g>

  <!-- Step -->
  <rect x="290" y="78" width="176" height="102" rx="8" fill="#26313c" stroke="#2f9bff"/>
  <text x="378" y="108" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Step</text>
  <text x="378" y="132" fill="#cfe2f5" font-size="11.5" text-anchor="middle">1 agent + skills</text>
  <text x="378" y="150" fill="#cfe2f5" font-size="11.5" text-anchor="middle">+ a task description</text>
  <text x="378" y="170" fill="#8fb9e0" font-size="10.5" text-anchor="middle">+ optional gates</text>

  <!-- arrow 2 -->
  <g stroke="#5a5a5a" stroke-width="2" fill="none"><path d="M474 129 h34"/><path d="M502 123 l8 6 -8 6"/></g>

  <!-- Flow -->
  <rect x="518" y="78" width="176" height="102" rx="8" fill="#2a2a2a" stroke="#3c3c3c"/>
  <text x="606" y="106" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Flow</text>
  <g>
    <circle cx="556" cy="140" r="10" fill="#343b44" stroke="#2f9bff"/><text x="556" y="144" fill="#cfe2f5" font-size="11" text-anchor="middle">1</text>
    <line x1="566" y1="140" x2="596" y2="140" stroke="#4a4a4a" stroke-width="2"/>
    <circle cx="606" cy="140" r="10" fill="#343b44" stroke="#2f9bff"/><text x="606" y="144" fill="#cfe2f5" font-size="11" text-anchor="middle">2</text>
    <line x1="616" y1="140" x2="646" y2="140" stroke="#4a4a4a" stroke-width="2"/>
    <circle cx="656" cy="140" r="10" fill="#343b44" stroke="#2f9bff"/><text x="656" y="144" fill="#cfe2f5" font-size="11" text-anchor="middle">3</text>
  </g>
  <text x="606" y="172" fill="#8a8a8a" font-size="10.5" text-anchor="middle">ordered steps (a DAG)</text>

  <!-- arrow 3 -->
  <g stroke="#5a5a5a" stroke-width="2" fill="none"><path d="M702 129 h34"/><path d="M730 123 l8 6 -8 6"/></g>

  <!-- Run -->
  <rect x="746" y="78" width="230" height="102" rx="8" fill="#21311f" stroke="#3fb950"/>
  <text x="861" y="108" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">▶ Run</text>
  <rect x="766" y="122" width="86" height="20" rx="10" fill="#1f6f33"/><text x="809" y="136" fill="#9ff0b0" font-size="10.5" text-anchor="middle">✓ artifact gate</text>
  <rect x="862" y="122" width="86" height="20" rx="10" fill="#1f6f33"/><text x="905" y="136" fill="#9ff0b0" font-size="10.5" text-anchor="middle">✓ review gate</text>
  <text x="861" y="166" fill="#9bbf9b" font-size="10.5" text-anchor="middle">gates decide when a step is done</text>
</svg>
